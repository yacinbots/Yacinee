name: Deploy VLESS WS TLS — Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Download EDtunnel worker
        run: |
          mkdir -p dist
          curl -sL https://raw.githubusercontent.com/6Kmfi6HP/EDtunnel/master/_worker.js -o dist/worker.js

      - name: Create wrangler.toml
        run: |
          cat > wrangler.toml << EOF
          name = "vless-ws-tls"
          main = "dist/worker.js"
          compatibility_date = "2024-01-01"
          workers_dev = true

          [vars]
          UUID = "${{ secrets.UUID }}"

          [observability.logs]
          enabled = true
          invocation_logs = true
          EOF

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
